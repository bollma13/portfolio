name: Bridge Status Monitor
on:
  schedule:
    - cron: '*/5 * * * *'  # This runs every 5 minutes, 24/7
  workflow_dispatch:      # This adds a "Run Now" button in the GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Run Monitor
        env:
          # These pull from the "Secrets" we set up in GitHub Settings
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        run: python monitor_script.py
        
      - name: Commit and Push
        run: |
          git config --global user.name "Bridge-Bot"
          git config --global user.email "bot@sambollman.com"
          git add static/bridge_status.json
          git commit -m "Bridge Status Change: $(cat static/bridge_status.json | jq -r .status)" || exit 0
          git push