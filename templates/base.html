<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samuel Bollman Portfolio</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <div class="navbar-brand-group">
                <a class="navbar-brand fw-bold mb-0" href="/">Samuel Bollman</a>
                <div class="contact-subtext d-none d-lg-block">
                    bollmasa@gmail.com • (616) 250-8483 • (Relocating to) Palo Alto, CA
                    <a href="{{ url_for('static', filename='files/Samuel_Bollman_Resume.pdf') }}" 
                       class="btn btn-outline-primary btn-sm ms-2" download>
                       Download Resume
                    </a>
                </div>
            </div>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto align-items-center">
                    <div class="d-lg-none text-center py-3 border-bottom border-secondary mb-2 w-100">
                        <small class="text-muted d-block">bollmasa@gmail.com • (616) 250-8483</small>
                        <small class="text-muted d-block mb-2">Palo Alto, CA</small>
                        <div class="mt-2">
                            <a href="{{ url_for('static', filename='files/Samuel_Bollman_Resume.pdf') }}" 
                               class="btn btn-outline-primary btn-sm" download>Download Resume</a>
                        </div>
                    </div>

                    <a class="nav-link px-3" href="/#home">HOME</a>
                    <a class="nav-link px-3" href="/#skills">SKILLS</a>
                    <a class="nav-link px-3" href="/#experience">EXPERIENCE</a>
                    <a class="nav-link px-3" href="/#education">EDUCATION</a>
                    
                    <div class="navbar-nav ms-auto align-items-center">
                        <a class="nav-link px-3 nav-separator" href="/projects">PROJECTS</a>
                        <a class="nav-link px-3" href="/personal">PERSONAL</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var hash = window.location.hash;
            if (hash) {
                var targetCollapse = document.querySelector(hash);
                if (targetCollapse && targetCollapse.classList.contains('collapse')) {
                    
                    // Manually initialize and show the collapse so Bootstrap tracks state
                    var bsCollapse = new bootstrap.Collapse(targetCollapse, {
                        toggle: false
                    });
                    bsCollapse.show();
                    
                    // Adjust scroll offset after the expansion animation completes
                    targetCollapse.addEventListener('shown.bs.collapse', function () {
                        var navHeight = document.querySelector('.navbar').offsetHeight;
                        var elementPosition = targetCollapse.parentElement.getBoundingClientRect().top;
                        var offsetPosition = elementPosition + window.pageYOffset - navHeight - 20;

                        window.scrollTo({
                            top: offsetPosition,
                            behavior: "smooth"
                        });
                    }, { once: true });
                }
            }
        });
    </script>
</body>
</html>
